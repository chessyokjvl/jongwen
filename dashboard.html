<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ตารางจองเวร 1323</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        
        /* Navbar Custom */
        .navbar-custom { background: linear-gradient(135deg, #FF6600 0%, #C0A060 100%); }
        .navbar-brand img { width: 40px; border-radius: 50%; margin-right: 10px; }
        .user-info { color: white; font-weight: 500; }

        /* Table Styles */
        .table-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
            overflow-x: auto; /* เลื่อนซ้ายขวาได้ */
        }
        .table-schedule { min-width: 1500px; /* บังคับให้ตารางกว้างพอสำหรับ 31 วัน */ font-size: 0.85rem; }
        .table-schedule th, .table-schedule td { text-align: center; vertical-align: middle; border: 1px solid #dee2e6; }
        .table-schedule thead th { background-color: #f1f3f5; position: sticky; top: 0; z-index: 1; }
        
        /* คอลัมน์ที่ถูกแช่แข็ง (Sticky Columns) เวลาเลื่อนขวาจะได้เห็นชื่อเสมอ */
        .sticky-col-1 { position: sticky; left: 0; background-color: #fff; z-index: 2; width: 50px;}
        .sticky-col-2 { position: sticky; left: 50px; background-color: #fff; z-index: 2; width: 200px; text-align: left !important;}
        .sticky-col-3 { position: sticky; left: 250px; background-color: #fff; z-index: 2; width: 180px; text-align: left !important;}
        
        .table-schedule thead th.sticky-col-1,
        .table-schedule thead th.sticky-col-2,
        .table-schedule thead th.sticky-col-3 { background-color: #e9ecef; z-index: 3; }

        /* สีกะ (Shift Colors) */
        .shift-m1 { background-color: #d1ecf1; color: #0c5460; font-weight: bold; cursor: pointer; } /* เช้า สาย 1 */
        .shift-a1 { background-color: #d4edda; color: #155724; font-weight: bold; cursor: pointer; } /* บ่าย สาย 1 */
        .shift-m2 { background-color: #fff3cd; color: #856404; font-weight: bold; cursor: pointer; } /* เช้า สาย 2 */
        .shift-a2 { background-color: #f8d7da; color: #721c24; font-weight: bold; cursor: pointer; } /* บ่าย สาย 2 */
        .shift-empty { cursor: pointer; transition: background 0.2s; }
        .shift-empty:hover { background-color: #e2e6ea; }

        .weekend-col { background-color: #fdfbfb; }

        /* ================= Print Styles (PDF) ================= */
        @media print {
            /* บังคับให้เบราว์เซอร์พิมพ์สีพื้นหลัง (Background Colors) ของ Badge ออกมาด้วย */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body { background-color: white; }
            
            /* ซ่อนเมนู ปุ่ม และแท็บต่างๆ ที่ไม่จำเป็นต้องปรินท์ */
            .navbar, .nav-pills, .btn, #monthSelector, .alert { 
                display: none !important; 
            }
            
            /* ปลดล็อกโครงสร้างตารางให้แสดงเต็มหน้ากระดาษ */
            .table-container { 
                box-shadow: none; 
                overflow: visible; 
                padding: 0; 
                margin: 0; 
            }
            
            /* ปรับขนาดฟอนต์และเส้นขอบให้เหมาะกับกระดาษ A4 แนวนอน */
            .table-schedule { 
                width: 100%; 
                min-width: 100%;
                font-size: 8pt; /* ลดขนาดฟอนต์ลงเพื่อให้พอดีหน้า */
            }
            
            /* ยกเลิก Sticky Column ตอนปรินท์ */
            .sticky-col-1, .sticky-col-2, .sticky-col-3 {
                position: static;
            }

            /* เพิ่มหัวกระดาษตอนปรินท์ */
            .container-fluid::before {
                content: "ตารางปฏิบัติงานสายด่วนสุขภาพจิต 1323 โรงพยาบาลจิตเวชเลยราชนครินทร์";
                display: block;
                font-size: 14pt;
                font-weight: bold;
                text-align: center;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand text-white fw-bold" href="#">
                <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="Logo">
                ระบบจองเวร 1323
            </a>
            <div class="d-flex align-items-center">
                <span class="user-info me-3" id="displayUserName">กำลังโหลด...</span>
                <span class="badge bg-light text-dark me-3" id="displayDepartment">...</span>
                <button class="btn btn-sm btn-outline-light" onclick="logout()">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row mb-3 align-items-center">
            <div class="col-md-3">
                <select class="form-select fw-bold text-primary" id="monthSelector"></select>
            </div>
            <div class="col-md-9 text-end">
                <button class="btn btn-outline-success me-2" onclick="exportExcel()">Export Excel</button>
                <button class="btn btn-outline-danger" onclick="window.print()">พิมพ์ PDF</button>
            </div>
        </div>

        <ul class="nav nav-pills mb-3 bg-white p-2 rounded shadow-sm" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-bold" id="pills-my-booking-tab" data-bs-toggle="pill" data-bs-target="#pills-my-booking" type="button" role="tab">📅 จองเวรของฉัน (เวรที่ว่าง)</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold" id="pills-master-tab" data-bs-toggle="pill" data-bs-target="#pills-master" type="button" role="tab">📊 ตารางปฏิบัติงานรวม</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-bold text-success" id="pills-stats-tab" data-bs-toggle="pill" data-bs-target="#pills-stats" type="button" role="tab">💰 สถิติและค่าตอบแทน</button>
            </li>
        </ul>

        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="pills-my-booking" role="tabpanel">
                <div class="alert alert-info shadow-sm border-0">
                    <i class="fw-bold">ระบบแสดงเฉพาะเวรที่ยังว่าง และคุณมีสิทธิ์จองตามเงื่อนไขของกลุ่มงานเท่านั้น</i>
                </div>
                <div class="row" id="myBookingGrid"></div>
            </div>

            <div class="tab-pane fade" id="pills-master" role="tabpanel">
                <div class="table-container">
                    <table class="table table-schedule" id="scheduleTable">
                        <thead>
                            <tr id="headerRow1">
                                <th rowspan="2" class="sticky-col-1">ลำดับ</th>
                                <th rowspan="2" class="sticky-col-2">ชื่อ - สกุล</th>
                                <th rowspan="2" class="sticky-col-3">ตำแหน่ง</th>
                            </tr>
                            <tr id="headerRow2"></tr>
                        </thead>
                        <tbody id="scheduleBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
