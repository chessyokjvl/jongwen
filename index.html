<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองเวรสายด่วนสุขภาพจิต 1323 - โรงพยาบาลจิตเวชเลยราชนครินทร์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-orange: #FF6600; /* สีส้มหลัก */
            --secondary-gold: #C0A060; /* สีทองเข้ม */
            --light-gold: #F0E6D2; /* สีทองอ่อน */
            --medical-white: #FFFFFF;
            --text-dark: #333333;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, var(--medical-white) 0%, var(--light-gold) 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
        }

        .auth-card {
            background: var(--medical-white);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            border: 1px solid rgba(192, 160, 96, 0.2); /* เส้นขอบทองบางๆ */
        }

        /* ส่วนซ้าย: แบรนด์และข้อมูล */
        .auth-brand-section {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--secondary-gold) 100%);
            color: white;
            padding: 50px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hospital-logo {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .brand-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
            line-height: 1.6;
        }

        .hotline-number {
            font-size: 4rem;
            font-weight: 800;
            margin-top: 20px;
            color: var(--light-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* ส่วนขวา: ฟอร์ม */
        .auth-form-section {
            padding: 50px;
            flex: 1.2;
        }

        .form-header {
            color: var(--primary-orange);
            font-weight: 600;
            margin-bottom: 30px;
            position: relative;
            padding-bottom: 10px;
        }

        .form-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 60px;
            height: 3px;
            background-color: var(--secondary-gold);
            border-radius: 2px;
        }

        .form-label {
            color: var(--text-dark);
            font-weight: 500;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 12px 15px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-gold);
            box-shadow: 0 0 0 0.25rem rgba(192, 160, 96, 0.1);
        }

        .btn-auth {
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .btn-primary-orange {
            background-color: var(--primary-orange);
            border: none;
            color: white;
        }

        .btn-primary-orange:hover {
            background-color: #e65c00;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(255, 102, 0, 0.2);
        }

        .btn-success-custom {
            background-color: #28a745;
            border: none;
            color: white;
        }

        .btn-success-custom:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(40, 167, 69, 0.2);
        }

        .auth-links a {
            color: var(--secondary-gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .auth-links a:hover {
            color: var(--primary-orange);
        }

        .pdpa-text {
            font-size: 0.85rem;
            color: #666;
        }

        .hidden { display: none !important; }

        <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
        /* Responsive */
        @media (max-width: 992px) {
            .auth-card {
                flex-direction: column;
            }
            .auth-brand-section, .auth-form-section {
                padding: 40px;
            }
            .hospital-logo {
                width: 100px;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .hotline-number {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-brand-section">
            <img src="https://www.rploei.go.th/ec2/wp-content/uploads/2017/08/cropped-cropped-cropped-3.png" alt="โลโก้โรงพยาบาลจิตเวชเลยราชนครินทร์" class="hospital-logo" style="border-radius: 50%;">
            <div class="brand-title">ระบบจองเวร</div>
            <div class="brand-subtitle">สายด่วนสุขภาพจิต โรงพยาบาลจิตเวชเลยราชนครินทร์</div>
            <div class="brand-subtitle mt-2">ให้บริการปรึกษาและช่วยเหลือตลอด 24 ชั่วโมง</div>
            <div class="hotline-number">1323</div>
        </div>

        <div class="auth-form-section">
            
            <div id="loginSection">
                <h3 class="form-header">เข้าสู่ระบบผู้ใช้งาน</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Username (ชื่อผู้ใช้)</label>
                        <input type="text" id="loginUsername" class="form-control" placeholder="กรอก Username ของคุณ" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password (รหัสผ่าน)</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="กรอกรหัสผ่านของคุณ" required>
                    </div>
                    <button type="submit" class="btn btn-auth btn-primary-orange w-100 mb-3">เข้าสู่ระบบ</button>
                    
                    <div class="d-flex justify-content-between auth-links">
                        <a href="#" onclick="toggleView('registerSection')">สมัครสมาชิกใหม่</a>
                        <a href="#" onclick="handleForgotPassword()" class="text-danger">ลืมรหัสผ่าน?</a>
                    </div>
                </form>
            </div>

            <div id="registerSection" class="hidden">
            <h3 class="form-header">ลงทะเบียนบุคลากร</h3>
            <form id="registerForm">

                <div class="mb-4">
                    <label class="form-label fw-bold">เลือกชื่อ - สกุล ของคุณ</label>
                    <select id="regFullNameSelect" placeholder="ค้นหาชื่อของคุณ..." autocomplete="off" required>
                        <option value="">กำลังโหลดรายชื่อ...</option>
                    </select>
                    <small class="text-danger mt-1 d-block">* ระบบจะผูกตำแหน่งและสังกัดอัตโนมัติ (หากไม่มีชื่อแปลว่าลงทะเบียนไปแล้ว)</small>
                </div>

                ```
                    <hr class="my-4" style="border-color: rgba(192, 160, 96, 0.3);">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="regUsername" class="form-control" placeholder="ตั้งชื่อผู้ใช้" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="regPassword" class="form-control" placeholder="ตั้งรหัสผ่าน" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email (สำหรับกู้คืนรหัสผ่าน)</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="เช่น example@mail.com" required>
                    </div>

                    <div class="form-check mb-4 pdpa-text">
                        <input class="form-check-input" type="checkbox" id="pdpaConsent" required>
                        <label class="form-check-label" for="pdpaConsent">
                            ข้าพเจ้ายินยอมให้ระบบประมวลผลข้อมูลส่วนบุคคลเบื้องต้นเพื่อใช้ในการจัดตารางเวรสายด่วน 1323 ตามพ.ร.บ. คุ้มครองข้อมูลส่วนบุคคล (PDPA)
                        </label>
                    </div>

                    <button type="submit" class="btn btn-auth btn-success-custom w-100 mb-3">ยืนยันการลงทะเบียน</button>
                    <div class="text-center auth-links">
                        <a href="#" onclick="toggleView('loginSection')" class="text-secondary">กลับไปหน้าเข้าสู่ระบบ</a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
